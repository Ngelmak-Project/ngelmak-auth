<p>
  <span th:text="#{email.moderation.acceptance.greeting}"></span>
  <span th:if="${firstName}">
    <strong th:text="${firstName}"></strong> </span
  >,
</p>

<p>
  <span th:text="#{email.moderation.acceptance.intro}"></span>
  <strong th:text="${associationName}"></strong>
  <span th:text="#{email.moderation.acceptance.intro2}"></span>
</p>

<p>
  <span th:text="#{email.moderation.acceptance.appreciation}"></span>
</p>

<div
  style="
    margin: 25px 0;
    padding: 18px;
    border-radius: 8px;
    background: #f5f7fb;
    border: 1px solid #e2e6ef;
  "
>
  <h3
    style="
      margin: 0 0 10px 0;
      font-size: 16px;
      font-weight: 600;
      color: #0d1b2a;
    "
    th:text="#{email.moderation.acceptance.infoTitle}"
  ></h3>

  <p style="margin: 0; line-height: 1.6">
    <strong th:text="#{email.moderation.acceptance.role}"></strong>
    <span th:text="#{email.moderation.acceptance.roleValue}"></span>
  </p>

  <p style="margin: 8px 0 0 0; line-height: 1.6">
    <strong th:text="#{email.moderation.acceptance.access}"></strong>
    <span th:text="#{email.moderation.acceptance.accessValue}"></span>
  </p>

  <p style="margin: 8px 0 0 0; line-height: 1.6">
    <strong th:text="#{email.moderation.acceptance.principles}"></strong>
    <span th:text="#{email.moderation.acceptance.principlesValue}"></span>
  </p>
</div>

<p th:text="${additionalNotes}"></p>

<p>
  <span th:text="#{email.moderation.acceptance.panelAccess}"></span>
</p>

<a
  th:href="${moderationPanelUrl}"
  class="button"
  th:text="#{email.moderation.acceptance.button}"
></a>

<p style="margin-top: 30px">
  <span th:text="#{email.moderation.acceptance.thanks}"></span>
</p>
