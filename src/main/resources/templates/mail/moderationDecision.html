<p>
  <span th:text="#{email.moderation.greeting}"></span>
  <span th:if="${firstName}">
    <strong th:text="${firstName}"></strong> </span
  >,
</p>

<p>
  <span th:text="#{email.moderation.intro}"></span>
  <strong th:text="${associationName}"></strong>.
</p>

<p>
  <span th:text="#{email.moderation.context}"></span>
</p>

<div
  style="
    margin: 25px 0;
    padding: 18px;
    border-radius: 8px;
    background: #f5f7fb;
    border: 1px solid #e2e6ef;
  "
>
  <h3
    style="
      margin: 0 0 10px 0;
      font-size: 16px;
      font-weight: 600;
      color: #0d1b2a;
    "
    th:text="#{email.moderation.detailsTitle}"
  ></h3>

  <p style="margin: 0; line-height: 1.6">
    <strong th:text="#{email.moderation.contentType}"></strong>
    <span th:text="${contentType}"></span>
  </p>

  <p style="margin: 8px 0 0 0; line-height: 1.6">
    <strong th:text="#{email.moderation.reason}"></strong>
    <span th:text="${decisionReason}"></span>
  </p>

  <p style="margin: 8px 0 0 0; line-height: 1.6">
    <strong th:text="#{email.moderation.action}"></strong>
    <span th:text="${decisionAction}"></span>
  </p>
</div>

<p th:text="${additionalNotes}"></p>

<p>
  <span th:text="#{email.moderation.appeal}"></span>
</p>

<a
  th:href="${appealUrl}"
  class="button"
  th:text="#{email.moderation.button}"
></a>

<p style="margin-top: 30px">
  <span th:text="#{email.moderation.thanks}"></span>
</p>
