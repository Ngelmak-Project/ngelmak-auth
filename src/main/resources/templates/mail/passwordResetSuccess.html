<p>
  <span th:text="#{email.password.reset.success.greeting}"></span>
  <span th:if="${firstName}">
    <strong th:text="${firstName}"></strong> </span
  >,
</p>

<p>
  <span th:text="#{email.password.reset.success.confirmation}"></span>
</p>

<p>
  <span th:text="#{email.password.reset.success.warning}"></span>
</p>

<a
  th:href="${loginUrl}"
  class="button"
  th:text="#{email.password.reset.success.button}"
></a>
