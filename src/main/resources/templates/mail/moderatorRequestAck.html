<p>
  <span th:text="#{email.moderation.request.greeting}"></span>
  <span th:if="${firstName}">
    <strong th:text="${firstName}"></strong> </span
  >,
</p>

<p>
  <span th:text="#{email.moderation.request.intro}"></span>
  <strong th:text="${associationName}"></strong>.
  <span th:text="#{email.moderation.request.thanks}"></span>
</p>

<p>
  <span th:text="#{email.moderation.request.review}"></span>
</p>

<div
  style="
    margin: 25px 0;
    padding: 18px;
    border-radius: 8px;
    background: #f5f7fb;
    border: 1px solid #e2e6ef;
  "
>
  <h3
    style="
      margin: 0 0 10px 0;
      font-size: 16px;
      font-weight: 600;
      color: #0d1b2a;
    "
    th:text="#{email.moderation.request.stepsTitle}"
  ></h3>

  <p style="margin: 0; line-height: 1.6">
    <strong th:text="#{email.moderation.request.responseTime}"></strong>
    <span th:text="#{email.moderation.request.responseTimeValue}"></span>
  </p>

  <p style="margin: 8px 0 0 0; line-height: 1.6">
    <strong th:text="#{email.moderation.request.criteria}"></strong>
    <span th:text="#{email.moderation.request.criteriaValue}"></span>
  </p>

  <p style="margin: 8px 0 0 0; line-height: 1.6">
    <strong th:text="#{email.moderation.request.acceptance}"></strong>
    <span th:text="#{email.moderation.request.acceptanceValue}"></span>
  </p>
</div>

<p th:text="#{email.moderation.request.questions}"></p>

<p style="margin-top: 30px">
  <span th:text="#{email.moderation.request.thanksEnd}"></span>
</p>
