spring:
  application:
    name: "Ngelmak Project - Auth"
    support:
      email: support@ngelmak.org
      phone: +33 1 23 45 67 89
      address: 123 Avenue de la République, Lyon, France
      facebook-url: "#"
      twitter-url: "#"
      instagram-url: "#"

  profiles:
    active: dev

  config.import: optional:vault:// # Enable Vault as a Config Data source. This requires at least one Vault backend to be enabled and resolvable.
  cloud:
    vault:
      uri: http://vault:8200
      authentication: approle
      fail-fast: false # Enable fail-fast to force confirmation. Spring Boot to crash immediately when Vault/OpenBao is not reachable
      app-role:
        role-id: ""
        secret-id: ""
      database:
        enabled: false
      kv:
        enabled: false
  datasource:
    url: jdbc:postgresql://ngelmak-pgdb:5432/ngelmakauthdb
    username: app_migrator
    password: migratorpass

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update # Use application-bootstrap.yml for updating the database schema

logging:
  level:
    org.springframework.vault: DEBUG
    # org.springframework.jdbc.datasource: DEBUG
    # org:
    #   hibernate:
    #     SQL: WARN
    #   springframework:
    #     jdbc:
    #       core:
    #         JdbcTemplate: DEBUG
    #         StatementCreatorUtils: TRACE
    org.springframework.boot.autoconfigure: INFO

debug: true

jwt-secret-key: "4fa3c9e1b7d24f8a9c3e5b1d7f2a9e4c6b1f8d3c2e7a4b9d3f6c1e8a2b7d4f"
jwt-expiration-in-seconds: 86400 # 24 hours
jwt-expiration-in-seconds-for-remember-me: 259200 # 3 days

# Frontend configuration
frontend:
  api:
    url: https://ngelmak.org

# Spring Mail Configuration
spring.mail.host: mail.example.org
spring.mail.port: 587
spring.mail.username: no-reply@example.org
spring.mail.password: MySecure$Pass123
spring.mail.properties.mail.smtp.auth: true
spring.mail.properties.mail.smtp.starttls.enable: true
spring.mail.properties.mail.smtp.starttls.required: true
spring.mail.properties.mail.smtp.connectiontimeout: 5000
spring.mail.properties.mail.smtp.timeout: 5000
spring.mail.properties.mail.smtp.writetimeout: 5000
spring.mail.properties.mail.smtp.ssl.protocols: TLSv1.2
spring.mail.properties.mail.smtp.ssl.trust: mail.example.org